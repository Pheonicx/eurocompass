name: EuroCompass Automatic Update

on:
  workflow_dispatch:

  schedule:
    # Every hour
    - cron: "0 * * * *"
    
concurrency:
  group: eurocompass-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    # Without this, GitHub's default job timeout is 6 hours. Combined
    # with cancel-in-progress: false above, a single hung run (e.g. a
    # browser process that doesn't exit cleanly) could silently block
    # every hourly trigger behind it for hours. 10 minutes is generous
    # for what this job actually does, even with Playwright involved.
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🌐 Install Playwright browser
        run: |
          playwright install --with-deps chromium

      - name: 🚀 Run EuroCompass
        env:
          GITHUB_TOKEN: ${{ secrets.EUROCOMPASS_GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ secrets.EUROCOMPASS_GITHUB_USERNAME }}
          GITHUB_REPO: ${{ secrets.EUROCOMPASS_GITHUB_REPO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.EUROCOMPASS_TELEGRAM_BOT_TOKEN }}
        run: |
          python main.py